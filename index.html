<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCF Manila Room Reservation System</title>

    <!-- SECURITY: Force HTTPS and restrict referrer leakage -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <script>
        // SECURITY: Redirect HTTP to HTTPS in production
        if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            location.replace('https:' + location.href.substring(5));
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@600;700&family=Montserrat:wght@400;500;600&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'heading': ['"EB Garamond"', 'serif'],
                        'body': ['"Montserrat"', 'sans-serif'],
                    },
                    colors: {
                        'ccf-blue': {
                            DEFAULT: '#004d60',
                            'dark': '#003e4d',
                        },
                        'ccf-red': {
                            DEFAULT: '#e00000',
                            'dark': '#b80000',
                        },
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css?v=1.4">
    <style>
        .calendar-sticky-header {
            position: -webkit-sticky;
            position: sticky;
            top: var(--calendar-header-top, 215px);
            /* Aligns below the sticky header + controls */
            z-index: 30;
            background-color: #fff;
            /* Ensure white background for visibility */
        }

        /* Added for the time column on the left (if you implement a fixed time column) */
        .time-slot-column {
            position: -webkit-sticky;
            position: sticky;
            left: 0;
            z-index: 50;
        }
    </style>
</head>

<body class="bg-white font-body text-gray-800">
    <!-- Role Selection Modal -->
    <dialog id="role-selection-modal" class="p-0 rounded-2xl shadow-2xl max-w-sm w-full backdrop:bg-black/50">
        <div class="p-8 text-center">
            <div class="mb-4">
                <img src="./ccf-full-logo-black.png" alt="CCF Logo" class="h-14 w-auto mx-auto">
            </div>
            <h2 class="text-2xl font-bold font-heading text-ccf-blue mb-2">Welcome</h2>
            <p class="text-sm text-gray-500 mb-6">Please select how you'd like to continue.</p>

            <div id="role-buttons" class="flex flex-col gap-3">
                <button id="role-user-btn" type="button"
                    class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-ccf-blue text-white rounded-xl hover:bg-ccf-blue-dark transition-all font-semibold text-base shadow-md hover:shadow-lg">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Continue as User
                </button>
                <button id="role-admin-btn" type="button"
                    class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-all font-semibold text-base border border-gray-200">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                    Continue as Admin
                </button>
            </div>

            <!-- Admin PIN input (hidden by default) -->
            <div id="role-admin-pin-section" class="hidden mt-4">
                <div class="relative">
                    <input type="password" id="role-admin-pin" placeholder="Enter Admin PIN"
                        class="block w-full px-4 py-3 text-center text-lg tracking-widest border-2 border-gray-300 rounded-xl bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-ccf-blue focus:border-ccf-blue">
                </div>
                <p id="role-admin-error" class="hidden mt-2 text-sm text-red-600 font-medium">Invalid PIN. Please try
                    again.</p>
                <div class="flex gap-2 mt-3">
                    <button id="role-admin-back-btn" type="button"
                        class="flex-1 px-4 py-2.5 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition-colors font-medium text-sm">Back</button>
                    <button id="role-admin-submit-btn" type="button"
                        class="flex-1 px-4 py-2.5 bg-ccf-blue text-white rounded-xl hover:bg-ccf-blue-dark transition-colors font-semibold text-sm">Login</button>
                </div>
            </div>
        </div>
    </dialog>

    <!-- Component: Announcement Banner -->
    <div id="component-announcement"></div>

    <!-- Component: Header (outside #app so sticky works at body level) -->
    <div id="component-header" class="sticky top-0 z-50"></div>

    <div id="app" class="container mx-auto p-4 max-w-7xl">
        <!-- Reservation Window Status Banner -->
        <div id="reservation-window-banner" class="hidden"></div>

        <main>
            <div id="sticky-controls-wrapper" class="sticky z-40 bg-white border-b border-gray-200 pt-2"
                style="top: var(--controls-top, 80px);">
                <section id="room-selector-section" class="px-4 pb-2">
                    <label for="room-selector" class="block text-sm font-medium text-gray-700 mb-1">Select a
                        Room:</label>
                    <div class="flex items-center gap-2">
                        <select id="room-selector"
                            class="block w-full max-w-[140px] sm:max-w-[180px] px-2 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm border border-gray-300 rounded-xl shadow-sm bg-white focus:outline-none focus:ring-ccf-red focus:border-ccf-red">
                        </select>
                        <span id="room-capacity-badge"
                            class="inline-flex items-center gap-1 text-[10px] sm:text-xs font-medium text-gray-500 bg-gray-100 border border-gray-200 rounded-full px-2 py-0.5 sm:px-2.5 sm:py-1 whitespace-nowrap">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 sm:h-3.5 w-3 sm:w-3.5 text-gray-400"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            Max <strong id="room-max-groups">6</strong> groups
                        </span>
                    </div>
                    <!-- Room optimization notice (shown for Jonah/Joseph/Moses only) -->
                    <div id="room-optimization-notice"
                        class="hidden mt-1.5 flex items-start gap-1.5 text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-md px-2.5 py-1.5 max-w-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 mt-0.5 flex-shrink-0 text-amber-500"
                            viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                                clip-rule="evenodd" />
                        </svg>
                        <span>Your reservation may be <strong>automatically moved to Main Hall</strong> if your time
                            slot is
                            available there, to optimize room usage.</span>
                    </div>
                </section>

                <!-- Data Freshness Status Bar -->
                <div id="data-freshness-bar"
                    class="hidden flex items-center justify-center gap-2 px-4 py-1.5 text-xs text-gray-400 cursor-pointer hover:text-ccf-blue hover:bg-blue-50/50 transition-colors rounded-md mx-4 mb-1 select-none"
                    title="Click to refresh calendar data">
                    <svg id="freshness-icon" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 flex-shrink-0"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    <span id="freshness-text">Loading...</span>
                </div>

                <section id="calendar-controls" class="flex justify-between items-center px-4 pb-4">
                    <button id="prev-week"
                        class="flex items-center gap-1 px-3 py-2 bg-gray-100 text-ccf-blue rounded-full hover:bg-ccf-blue hover:text-white transition-colors border border-gray-200 font-medium text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                        <span class="hidden sm:inline">Prev</span>
                    </button>
                    <h2 id="current-week-title"
                        class="text-xl md:text-2xl font-semibold text-center font-heading text-ccf-blue"></h2>
                    <button id="next-week"
                        class="flex items-center gap-1 px-3 py-2 bg-gray-100 text-ccf-blue rounded-full hover:bg-ccf-blue hover:text-white transition-colors border border-gray-200 font-medium text-sm">
                        <span class="hidden sm:inline">Next</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </section>
            </div>

            <section id="calendar-view"
                class="bg-white rounded-2xl shadow-sm border border-gray-200 relative overflow-clip">
                <!-- Sticky Day Headers Row (populated by JS, lives OUTSIDE the grid so sticky works) -->
                <div id="calendar-day-headers" class="grid border-t border-l border-gray-200 calendar-sticky-header"
                    style="grid-template-columns: 50px repeat(7, 1fr);">
                </div>
                <!-- Time Slots Grid (scrolls under the sticky header row) -->
                <div id="calendar-slots-grid" class="grid border-l border-gray-200"
                    style="grid-template-columns: 50px repeat(7, 1fr);">
                </div>
                <div id="loader" class="hidden absolute inset-0 bg-white/70 flex justify-center items-center z-40">
                    <div class="loader-spinner"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Components: Dynamic Modal Injection Points -->
    <div id="component-booking-modal"></div>
    <div id="component-cancel-modal"></div>
    <div id="component-email-cancel-modal"></div>
    <div id="component-move-modal"></div>
    <div id="component-my-bookings-modal"></div>
    <div id="component-info-modals"></div>
    <!-- Removed: admin-login-modal is replaced by role-selection-modal -->
    <div id="component-floorplan-modal"></div>
    <div id="component-success-modal"></div>
    <div id="component-denied-modal"></div>
    <div id="component-loader"></div>

    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="config.js?v=1.4"></script>
    <script type="module" src="script.js?v=2.0"></script>
</body>

</html>
