<dialog id="admin-login-modal" class="p-0 rounded-2xl shadow-xl max-w-sm w-full">
    <div class="p-6">
        <h3 class="text-2xl font-bold mb-4 font-heading text-ccf-blue">Admin Login</h3>
        <p class="mb-4 text-sm text-gray-600">Please enter the Admin PIN to access the dashboard.</p>
        <form id="admin-login-form" method="dialog">
            <div class="mb-6">
                <label for="admin-login-pin" class="sr-only">Admin PIN</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <input type="password" id="admin-login-pin" name="pin" required
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-ccf-blue focus:border-ccf-blue sm:text-sm"
                        placeholder="Enter PIN">
                </div>
            </div>
            <div class="flex justify-end gap-3">
                <button type="button"
                    class="cancel-btn px-4 py-2 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 font-medium transition-colors">Cancel</button>
                <button type="submit"
                    class="px-4 py-2 bg-ccf-blue text-white rounded-xl hover:bg-ccf-blue-dark font-medium transition-colors">Login</button>
            </div>
        </form>
    </div>
</dialog>
