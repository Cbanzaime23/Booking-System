<dialog id="success-modal" class="p-0 rounded-lg shadow-xl max-w-md w-full">
    <div class="p-6 text-center">
        <div class="w-16 h-16 rounded-full bg-green-100 p-4 flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h3 class="text-2xl font-bold mb-3 font-heading text-ccf-blue">Booking Confirmed!</h3>
        <p id="success-redirect-message" class="text-gray-600 mb-4"></p>

        <div class="rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 p-4 mb-4 text-left">
            <p class="text-sm"><strong>Booking Code:</strong></p>
            <span id="success-booking-code" class="text-2xl font-bold text-gray-800 tracking-wider"></span>

            <p class="text-sm mt-3"><strong>Room:</strong></p>
            <span id="success-room-name" class="text-xl font-bold text-gray-800"></span>

            <div class="grid grid-cols-2 gap-4 mt-3">
                <div>
                    <p class="text-sm"><strong>Date:</strong></p>
                    <span id="success-date" class="text-lg font-semibold text-gray-800"></span>
                </div>
                <div>
                    <p class="text-sm"><strong>Day:</strong></p>
                    <span id="success-day" class="text-lg font-semibold text-gray-800"></span>
                </div>
            </div>

            <p class="text-sm mt-3"><strong>Time:</strong></p>
            <span id="success-time" class="text-lg font-semibold text-gray-800"></span>
        </div>

        <div class="text-sm text-gray-600 bg-blue-50 border border-blue-100 p-3 rounded-md mb-6 text-left">
            <div class="flex items-start gap-2">
                <svg class="w-5 h-5 text-ccf-blue shrink-0 mt-0.5" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                </svg>
                <p>We've sent a <strong>confirmation email</strong> with these details and a calendar invite to the
                    email address provided.</p>
            </div>
        </div>

        <div id="calendar-links-container"></div>

        <button type="button" id="success-done-btn"
            class="w-full px-5 py-3 bg-ccf-red text-white rounded-md hover:bg-ccf-red-dark font-semibold">
            Done
        </button>
    </div>
</dialog>
