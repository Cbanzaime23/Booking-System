<dialog id="denied-modal" class="p-0 rounded-lg shadow-xl max-w-md w-full">
    <div class="p-6 text-center shadow-[0_0_15px_rgba(224,0,0,0.15)] bg-white rounded-lg">
        <div class="w-16 h-16 rounded-full bg-red-100 p-4 flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-ccf-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>

        <h3 class="text-2xl font-bold mb-3 font-heading text-ccf-red">Booking Denied</h3>

        <div class="rounded-lg border-2 border-dashed border-red-300 bg-red-50 p-4 mb-6 text-left">
            <p id="denied-reason-message" class="text-sm text-gray-800 font-medium text-center leading-relaxed"></p>
        </div>

        <button type="button" id="denied-done-btn"
            class="cancel-btn w-full px-5 py-3 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300 transition-colors font-semibold shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-1">
            Close
        </button>
    </div>
</dialog>
