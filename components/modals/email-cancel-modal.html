<dialog id="email-cancel-confirm-modal" class="p-0 rounded-lg shadow-xl max-w-sm w-full">
    <div class="p-6 text-center">
        <h3 class="text-xl font-bold mb-4 font-heading text-ccf-red-dark">Confirm Cancellation</h3>
        <p class="mb-4 text-gray-600">Are you sure you want to cancel the following booking?</p>

        <div class="bg-red-50 border border-red-100 p-4 rounded-md mb-6 text-left shadow-sm">
            <p class="text-sm text-gray-800 mb-1"><strong>Event:</strong> <span id="email-cancel-event-name"></span></p>
            <p class="text-sm text-gray-800 mb-1"><strong>Date:</strong> <span id="email-cancel-date"></span></p>
            <p class="text-sm text-gray-800"><strong>Time:</strong> <span id="email-cancel-time"></span></p>
        </div>

        <div class="flex flex-col gap-3">
            <button type="button" id="email-cancel-yes-btn"
                class="w-full px-4 py-3 bg-ccf-red text-white rounded-md hover:bg-ccf-red-dark font-semibold shadow-sm transition-colors text-sm">
                Yes, Cancel My Reservation
            </button>
            <button type="button" id="email-cancel-no-btn"
                class="w-full px-4 py-3 bg-gray-100 text-gray-800 rounded-md hover:bg-gray-200 font-semibold border border-gray-300 transition-colors text-sm">
                No, Keep It
            </button>
        </div>
    </div>
</dialog>
