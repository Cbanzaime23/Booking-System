<header id="main-header"
    class="bg-white text-black p-4 shadow-md flex flex-col md:flex-row items-center justify-between">
    <div class="flex items-center justify-center md:justify-start w-full md:w-auto mb-2 md:mb-0">
        <div class="mr-4">
            <img src="./ccf-full-logo-black.png" alt="CCF Logo" class="h-12 w-auto">
        </div>
        <h1 class="text-2xl md:text-3xl font-bold text-center md:text-left font-heading text-ccf-blue">CCF
            Manila Room Reservation System</h1>
    </div>

    <div class="flex gap-4">
        <button id="my-bookings-btn"
            class="text-sm font-medium text-gray-500 hover:text-ccf-blue transition-colors flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            My Bookings
        </button>
        <button id="go-to-dashboard-btn"
            class="text-sm font-medium text-gray-500 hover:text-ccf-red transition-colors flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            Admin Dashboard
        </button>
    </div>
</header>
