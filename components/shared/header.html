<header id="main-header" class="bg-white text-black p-4 shadow-md">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between">
        <div class="flex items-center justify-center md:justify-start w-full md:w-auto mb-2 md:mb-0">
            <div class="mr-3 shrink-0">
                <img src="./ccf-full-logo-black.png" alt="CCF Logo" class="h-10 sm:h-12 w-auto object-contain">
            </div>
            <h1
                class="text-lg leading-tight sm:text-2xl md:text-3xl font-bold text-center md:text-left font-heading text-ccf-blue">
                CCF
                Manila Room Reservation System</h1>
        </div>

        <div class="flex items-center gap-3">
            <!-- Admin Mode Badge (hidden by default, shown when admin is logged in) -->
            <span id="admin-mode-badge"
                class="hidden items-center gap-1.5 px-3 py-1.5 bg-violet-50 text-violet-700 text-xs font-bold rounded-full border border-violet-200 uppercase tracking-wider">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
                Admin Mode
            </span>

            <button id="my-bookings-btn"
                class="text-sm font-medium text-gray-500 hover:text-ccf-blue transition-colors flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                My Reservations
            </button>

            <!-- Dashboard link: hidden by default, shown only for admins -->
            <a id="go-to-dashboard-link" href="dashboard.html"
                class="hidden text-sm font-medium text-gray-500 hover:text-ccf-red transition-colors items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7" />
                </svg>
                Dashboard
            </a>
        </div>
    </div>
</header>
